<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Booked</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { display:grid; min-height:100vh; place-items:center; padding:24px; }
    .not-found { width:min(100%, 680px); padding:clamp(28px,7vw,62px); text-align:center; background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius-lg); box-shadow:var(--shadow); }
    .not-found h1 { max-width:none; margin:.4rem 0; font-size:clamp(3rem,12vw,7rem); }
    .not-found p { color:var(--muted); }
  </style>
</head>
<body>
  <main class="not-found">
    <span class="badge">Booked · 404</span>
    <h1>Page not found</h1>
    <p>The page may have moved, or the address may contain a typo.</p>
    <a class="button button-primary" href="./">Return to the reading journey</a>
  </main>
</body>
</html>
